name: npm publish pi-67 manager

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish; must match VERSION and packages/pi67-cli/package.json"
        required: true
      tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        type: boolean
        required: true
        default: true
      auth_mode:
        description: "Publish auth mode. Use trusted normally; token-bootstrap is for first publish only with repo secret NPM_TOKEN."
        type: choice
        required: true
        default: "trusted"
        options:
          - trusted
          - token-bootstrap
      first_publish_confirm:
        description: "For first publish only: type @bigking67/pi-67 after npm scope and Trusted Publisher are configured"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-pi-67-manager-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        shell: bash
        run: |
          set -euo pipefail
          npm install -g npm@latest
          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const [version] = process.argv.slice(2);
          const match = /^([0-9]+)\.([0-9]+)\.([0-9]+)/.exec(version);
          if (!match) throw new Error(`could not parse npm version: ${version}`);
          const [major, minor, patch] = match.slice(1).map(Number);
          const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
          if (!ok) {
            throw new Error(`npm ${major}.${minor}.${patch} is too old for trusted publishing; require >= 11.5.1`);
          }
          NODE

      - name: Install Pi extension dependencies
        shell: bash
        run: |
          mkdir -p npm
          cp package.json npm/package.json
          npm --prefix npm install --ignore-scripts

      - name: Validate requested version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          NPM_TAG: ${{ inputs.tag }}
          AUTH_MODE: ${{ inputs.auth_mode }}
        run: |
          set -euo pipefail
          version_file="$(tr -d '[:space:]' < VERSION)"
          package_version="$(node -p "require('./package.json').version")"
          cli_version="$(node -p "require('./packages/pi67-cli/package.json').version")"
          if [ "$REQUESTED_VERSION" != "$version_file" ]; then
            echo "workflow version ($REQUESTED_VERSION) does not match VERSION ($version_file)" >&2
            exit 1
          fi
          if [ "$package_version" != "$version_file" ]; then
            echo "root package.json version ($package_version) does not match VERSION ($version_file)" >&2
            exit 1
          fi
          if [ "$cli_version" != "$version_file" ]; then
            echo "CLI package version ($cli_version) does not match VERSION ($version_file)" >&2
            exit 1
          fi
          if ! [[ "$NPM_TAG" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "invalid npm tag: $NPM_TAG" >&2
            exit 1
          fi
          if [[ "$NPM_TAG" =~ ^v?[0-9]+(\.[0-9]+){0,2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "npm tag must not look like a semver version: $NPM_TAG" >&2
            exit 1
          fi
          case "$AUTH_MODE" in
            trusted|token-bootstrap) ;;
            *)
              echo "invalid auth mode: $AUTH_MODE" >&2
              exit 1
              ;;
          esac

      - name: Run npm manager checks
        run: |
          node packages/pi67-cli/scripts/check.mjs
          node packages/pi67-cli/bin/pi-67.mjs --help >/dev/null
          node packages/pi67-cli/bin/pi-67.mjs --agent-dir "$PWD" --repo-root "$PWD" update --check --json --no-remote >/dev/null
          node packages/pi67-cli/bin/pi-67.mjs --agent-dir "$PWD" --repo-root "$PWD" extensions doctor --json --no-remote >/dev/null
          node packages/pi67-cli/bin/pi-67.mjs --agent-dir "$PWD" --repo-root "$PWD" backups list --json >/dev/null
          node packages/pi67-cli/bin/pi-67.mjs --dry-run self-update >/dev/null

      - name: Run release metadata check
        run: bash scripts/pi67-release-check.sh

      - name: Run full pi-67 smoke gate
        run: bash scripts/pi67-smoke.sh --ci

      - name: Pack npm manager
        run: npm pack --dry-run ./packages/pi67-cli

      - name: Check npm version publication state
        id: npm_version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          package_name="@bigking67/pi-67"
          set +e
          output="$(npm view "${package_name}@${REQUESTED_VERSION}" version --json 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "published_version=${output}" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$output" | grep -q 'E404'; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit "$status"
          fi

      - name: Validate npm publish target
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          FIRST_PUBLISH_CONFIRM: ${{ inputs.first_publish_confirm }}
        run: |
          set -euo pipefail
          args=(packages/pi67-cli/bin/pi-67.mjs --agent-dir "$PWD" --repo-root "$PWD" publish-check --strict --no-pack)
          if [ "$FIRST_PUBLISH_CONFIRM" = "@bigking67/pi-67" ]; then
            args+=(--allow-first-publish)
          fi
          node "${args[@]}"

      - name: Publish dry-run
        if: ${{ inputs.dry_run && steps.npm_version.outputs.published != 'true' }}
        env:
          NPM_TAG: ${{ inputs.tag }}
        run: npm publish ./packages/pi67-cli --access public --tag "$NPM_TAG" --dry-run

      - name: Published version dry-run compatibility
        if: ${{ inputs.dry_run && steps.npm_version.outputs.published == 'true' }}
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          echo "@bigking67/pi-67@$REQUESTED_VERSION is already published."
          echo "Skipping npm publish --dry-run because npm rejects dry-runs over an existing version."
          echo "Pack, release metadata, workflow, and manager checks above cover this post-publish dry-run."

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NPM_TAG: ${{ inputs.tag }}
          AUTH_MODE: ${{ inputs.auth_mode }}
          NODE_AUTH_TOKEN: ${{ inputs.auth_mode == 'token-bootstrap' && secrets.NPM_TOKEN || '' }}
        run: |
          set -euo pipefail
          if [ "$AUTH_MODE" = "token-bootstrap" ]; then
            if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
              echo "auth_mode=token-bootstrap requires repository secret NPM_TOKEN" >&2
              exit 1
            fi
            # Bootstrap fallback for the first publish only. Remove/restrict the
            # token after the package exists, then use trusted publishing.
            npm publish ./packages/pi67-cli --access public --tag "$NPM_TAG" --provenance
          else
            # No long-lived token is configured here. npm Trusted Publishing uses
            # GitHub Actions OIDC via the workflow id-token permission.
            npm publish ./packages/pi67-cli --access public --tag "$NPM_TAG"
          fi
