name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Pi extension dependencies
        run: |
          mkdir -p npm
          cp package.json npm/package.json
          npm --prefix npm install --ignore-scripts

      - name: Run pi-67 smoke
        run: bash scripts/pi67-smoke.sh --ci

  windows-powershell-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run pi-67 PowerShell smoke
        shell: pwsh
        run: .\scripts\pi67-smoke.ps1 -Ci
