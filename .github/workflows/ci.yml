name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Pi extension dependencies
        run: |
          mkdir -p npm
          cp package.json npm/package.json
          npm --prefix npm install --ignore-scripts

      - name: Run pi-67 smoke
        run: bash scripts/pi67-smoke.sh --ci

  windows-powershell-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install upstream Pi runtime
        run: npm install -g @earendil-works/pi-coding-agent

      - name: Install Pi extension dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path npm | Out-Null
          Copy-Item package.json npm\package.json -Force
          npm --prefix npm install --ignore-scripts

      - name: Run pi-67 CLI contract smoke
        shell: pwsh
        run: |
          $Repo = (Get-Location).Path
          $TempAgent = Join-Path $env:RUNNER_TEMP "pi67-xtalpi-config-$([Guid]::NewGuid().ToString('N'))"
          New-Item -ItemType Directory -Force -Path $TempAgent | Out-Null
          node packages/pi67-cli/bin/pi-67.mjs --help
          node packages/pi67-cli/bin/pi-67.mjs update --help
          node packages/pi67-cli/bin/pi-67.mjs skills --help
          node packages/pi67-cli/bin/pi-67.mjs xtalpi --help
          node packages/pi67-cli/bin/pi-67.mjs backups --help
          node packages/pi67-cli/bin/pi-67.mjs --agent-dir $Repo --repo-root $Repo update --check --json --no-remote
          node packages/pi67-cli/bin/pi-67.mjs --agent-dir $Repo --repo-root $Repo backups prune --keep-last 10 --dry-run --json
          node packages/pi67-cli/bin/pi-67.mjs --agent-dir $Repo --repo-root $Repo xtalpi smoke --self-test
          $Configure = node packages/pi67-cli/bin/pi-67.mjs --agent-dir $TempAgent --repo-root $Repo xtalpi configure --dry-run --no-prompt --json | ConvertFrom-Json
          if ($Configure.schema -ne "pi67-xtalpi-config/v1" -or $Configure.provider -ne "xtalpi-pi-tools" -or $Configure.model -ne "deepseek-v4-pro") {
            throw "unexpected xtalpi configure dry-run contract"
          }
          if ($Configure.configured -eq $true -or $Configure.dryRun -ne $true) {
            throw "fresh xtalpi configure dry-run must remain unconfigured"
          }
          .\scripts\pi67-bootstrap.ps1 -SelfTest
          .\scripts\pi67-bootstrap.ps1 -DryRun
          .\scripts\pi67-bootstrap.ps1 -DryRun -Minimal
          .\scripts\pi67-windows-acceptance.ps1 -SelfTest

      - name: Run upstream Pi runtime smoke
        shell: pwsh
        timeout-minutes: 2
        run: |
          $Output = @(& pi --version 2>&1)
          if ($LASTEXITCODE -ne 0) {
            throw "bare pi --version failed: $($Output -join [Environment]::NewLine)"
          }
          if ([string]::IsNullOrWhiteSpace(($Output -join "`n"))) {
            throw "bare pi --version returned empty output"
          }
          $Output
          # Upstream Pi hides built-in models until that provider has a credential.
          # A non-secret fixture key proves registration without making a request.
          $env:DEEPSEEK_API_KEY = "pi67-ci-model-discovery-only"
          try {
            $Models = (@(& pi --list-models deepseek 2>&1) -join "`n")
            if ($LASTEXITCODE -ne 0 -or $Models -notmatch '(?m)^deepseek\s+deepseek-v4-pro\s+') {
              throw "upstream Pi does not expose deepseek/deepseek-v4-pro: $Models"
            }
          } finally {
            Remove-Item "Env:DEEPSEEK_API_KEY" -ErrorAction SilentlyContinue
          }
          $Models
          $Repo = (Get-Location).Path
          .\scripts\pi67-zero-key-startup-smoke.ps1 -RepoRoot $Repo -PiBin "pi"

      - name: Run Windows PowerShell 5.1 bootstrap contracts
        shell: powershell
        run: |
          .\scripts\pi67-bootstrap.ps1 -SelfTest
          .\scripts\pi67-bootstrap.ps1 -DryRun
          .\scripts\pi67-bootstrap.ps1 -DryRun -Minimal
          .\scripts\pi67-windows-acceptance.ps1 -SelfTest

      - name: Run optional launch-helper compatibility
        shell: pwsh
        run: |
          $Repo = (Get-Location).Path
          $PiVersion = ((@(& pi --version 2>&1)) -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($PiVersion)) {
            throw "installed upstream Pi runtime returned an empty version"
          }
          $Output = @(& node packages/pi67-cli/bin/pi-67.mjs --agent-dir $Repo --repo-root $Repo launch -- --version 2>&1)
          if ($LASTEXITCODE -ne 0) {
            throw "optional pi-67 launch helper failed: $($Output -join [Environment]::NewLine)"
          }
          if (-not (($Output -join "`n").Contains($PiVersion))) {
            throw "optional pi-67 launch helper did not execute the installed upstream Pi runtime"
          }
          $Output

      - name: Run pi-67 PowerShell smoke
        shell: pwsh
        run: .\scripts\pi67-smoke.ps1 -Ci
